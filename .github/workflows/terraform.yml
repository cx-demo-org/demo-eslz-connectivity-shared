name: terraform

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        type: choice
        required: true
        default: plan
        options: [plan, apply, destroy]
      force_apply:
        description: "Allow apply re-runs even if no new code changes exist"
        type: boolean
        required: true
        default: false
      confirm_destroy:
        description: "Confirm destroy (must be checked to run destroy)"
        type: boolean
        required: true
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: tf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_OIDC_AUDIENCE: api://AzureADTokenExchange
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID || 'c14be0d1-54b1-4c90-949b-2775aec6307e' }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID || '9a9712e7-1382-4528-8495-b52ae7688acb' }}
  # Azure CLI context for login; Terraform uses subscription_id from the env tfvars.
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID || '1d70f8ca-f7e4-4d69-98fe-53959be8f10a' }}
  TF_IN_AUTOMATION: true
  TF_REGISTRY_CLIENT_TIMEOUT: 120
  TF_PLUGIN_CACHE_DIR: ${{ github.workspace }}/.terraform.d/plugin-cache

jobs:
  plan:
    name: plan (prod)
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'workflow_dispatch' || github.event.inputs.action != 'destroy'

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: ${{ env.ARM_OIDC_AUDIENCE }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Prepare Terraform plugin cache
        shell: bash
        run: mkdir -p "${TF_PLUGIN_CACHE_DIR}"

      - name: Cache Terraform plugin downloads
        uses: actions/cache@v4
        with:
          path: .terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-plugin-cache-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-plugin-cache-

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init (retry)
        shell: bash
        run: |
          set -u

          max_attempts=5
          attempt=1
          while true; do
            echo "terraform init attempt ${attempt}/${max_attempts}"
            if terraform init -input=false -backend-config=environments/prod/backend.hcl; then
              break
            fi

            if [[ ${attempt} -ge ${max_attempts} ]]; then
              echo "terraform init failed after ${max_attempts} attempts"
              exit 1
            fi

            sleep_seconds=$((attempt * 20))
            echo "Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -lock-timeout=10m -input=false -no-color -var-file=environments/prod/terraform.tfvars -out=tfplan

      - name: Terraform plan summary
        if: always()
        shell: bash
        run: |
          if [[ -f tfplan ]]; then
            summary="$(terraform show -no-color tfplan | awk '
              /^No changes\./{line=$0}
              /^Plan: /{line=$0}
              END{print line}
            ')"

            if [[ -z "${summary}" ]]; then
              summary="Plan summary not found (see artifact)."
            fi

            echo "${summary}"
            {
              echo "### Terraform plan summary (prod)"
              echo ""
              echo "\`${summary}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "Plan output not available."
            {
              echo "### Terraform plan summary (prod)"
              echo ""
              echo "Plan output not available."
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Save plan output
        if: always()
        shell: bash
        run: |
          if [[ -f tfplan ]]; then
            terraform show -no-color tfplan > plan-prod.txt
          else
            echo "Plan output not available." > plan-prod.txt
          fi

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: plan-prod.txt
          if-no-files-found: warn

  apply:
    name: apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' && github.event.inputs.force_apply == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: ${{ env.ARM_OIDC_AUDIENCE }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Prepare Terraform plugin cache
        shell: bash
        run: mkdir -p "${TF_PLUGIN_CACHE_DIR}"

      - name: Cache Terraform plugin downloads
        uses: actions/cache@v4
        with:
          path: .terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-plugin-cache-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-plugin-cache-

      - name: Terraform apply (selected environments)
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Applying prod ==="
          rm -rf .terraform

          max_attempts=5
          attempt=1
          while true; do
            echo "terraform init attempt ${attempt}/${max_attempts}"
            if terraform init -input=false -reconfigure -backend-config="environments/prod/backend.hcl"; then
              break
            fi

            if [[ ${attempt} -ge ${max_attempts} ]]; then
              echo "terraform init failed after ${max_attempts} attempts"
              exit 1
            fi

            sleep_seconds=$((attempt * 20))
            echo "Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

          terraform apply -lock-timeout=10m -input=false -auto-approve -var-file="environments/prod/terraform.tfvars"

  destroy:
    name: destroy (prod)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.action == 'destroy' &&
      github.event.inputs.confirm_destroy == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: ${{ env.ARM_OIDC_AUDIENCE }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Prepare Terraform plugin cache
        shell: bash
        run: mkdir -p "${TF_PLUGIN_CACHE_DIR}"

      - name: Cache Terraform plugin downloads
        uses: actions/cache@v4
        with:
          path: .terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-plugin-cache-${{ hashFiles('**/.terraform.lock.hcl') }}
          restore-keys: |
            ${{ runner.os }}-terraform-plugin-cache-

      - name: Terraform init (retry)
        shell: bash
        run: |
          set -u

          max_attempts=5
          attempt=1
          while true; do
            echo "terraform init attempt ${attempt}/${max_attempts}"
            if terraform init -input=false -backend-config=environments/prod/backend.hcl; then
              break
            fi

            if [[ ${attempt} -ge ${max_attempts} ]]; then
              echo "terraform init failed after ${max_attempts} attempts"
              exit 1
            fi

            sleep_seconds=$((attempt * 20))
            echo "Retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
            attempt=$((attempt + 1))
          done

      - name: Terraform validate
        run: terraform validate

      - name: Terraform destroy plan
        run: terraform plan -destroy -lock-timeout=10m -input=false -no-color -var-file=environments/prod/terraform.tfvars -out=tfdestroyplan

      - name: Terraform destroy apply
        run: terraform apply -lock-timeout=10m -input=false -auto-approve tfdestroyplan
