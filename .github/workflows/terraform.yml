name: terraform

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        type: choice
        required: true
        default: plan
        options: [plan, apply]
      force_apply:
        description: "Allow apply re-runs even if no new code changes exist"
        type: boolean
        required: true
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: tf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_OIDC_AUDIENCE: api://AzureADTokenExchange
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID || 'c14be0d1-54b1-4c90-949b-2775aec6307e' }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID || '9a9712e7-1382-4528-8495-b52ae7688acb' }}
  # Azure CLI context for login; Terraform uses subscription_id from the env tfvars.
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID || '1d70f8ca-f7e4-4d69-98fe-53959be8f10a' }}
  TF_IN_AUTOMATION: true

jobs:
  plan:
    name: plan (prod)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: ${{ env.ARM_OIDC_AUDIENCE }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false -backend-config=environments/prod/backend.hcl

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -lock-timeout=10m -input=false -no-color -var-file=environments/prod/terraform.tfvars -out=tfplan

      - name: Terraform plan summary
        if: always()
        shell: bash
        run: |
          if [[ -f tfplan ]]; then
            summary="$(terraform show -no-color tfplan | awk '
              /^No changes\./{line=$0}
              /^Plan: /{line=$0}
              END{print line}
            ')"

            if [[ -z "${summary}" ]]; then
              summary="Plan summary not found (see artifact)."
            fi

            echo "${summary}"
            {
              echo "### Terraform plan summary (prod)"
              echo ""
              echo "\`${summary}\`"
            } >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "Plan output not available."
            {
              echo "### Terraform plan summary (prod)"
              echo ""
              echo "Plan output not available."
            } >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Save plan output
        if: always()
        shell: bash
        run: |
          if [[ -f tfplan ]]; then
            terraform show -no-color tfplan > plan-prod.txt
          else
            echo "Plan output not available." > plan-prod.txt
          fi

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: plan-prod.txt
          if-no-files-found: warn

  apply:
    name: apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' && github.event.inputs.force_apply == 'true')
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: ${{ env.ARM_OIDC_AUDIENCE }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform apply (selected environments)
        shell: bash
        run: |
          set -euo pipefail

          echo "=== Applying prod ==="
          rm -rf .terraform
          terraform init -input=false -reconfigure -backend-config="environments/prod/backend.hcl"
          terraform apply -lock-timeout=10m -input=false -auto-approve -var-file="environments/prod/terraform.tfvars"
