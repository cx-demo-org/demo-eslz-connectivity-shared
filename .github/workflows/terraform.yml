name: terraform

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        type: choice
        required: true
        default: plan
        options:
          - plan
          - apply
      environment:
        description: "Which environment to target"
        type: choice
        required: true
        default: dev
        options:
          - dev
          - prod
          - both

permissions:
  contents: read
  id-token: write

concurrency:
  group: tf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_OIDC_AUDIENCE: api://AzureADTokenExchange
  TF_IN_AUTOMATION: true

jobs:
  plan:
    name: plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.action == 'plan')

    strategy:
      fail-fast: false
      matrix:
        env: ${{ (github.event_name == 'workflow_dispatch' && github.event.inputs.environment != 'both') && fromJSON(format('["{0}"]', github.event.inputs.environment)) || fromJSON('["dev","prod"]') }}

    environment: ${{ matrix.env }}

    env:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      TFSTATE_SUBSCRIPTION_ID: ${{ vars.TFSTATE_SUBSCRIPTION_ID }}

      # Target subscriptions/tenants (provider config). Prefer HUB_* if defined.
      TF_VAR_hub_subscription_id: ${{ vars.HUB_SUBSCRIPTION_ID || vars.ARM_SUBSCRIPTION_ID }}
      TF_VAR_hub_tenant_id: ${{ vars.HUB_TENANT_ID || vars.ARM_TENANT_ID }}
      TF_VAR_virtual_wan_subscription_id: ${{ vars.VIRTUAL_WAN_SUBSCRIPTION_ID }}
      TF_VAR_virtual_wan_tenant_id: ${{ vars.VIRTUAL_WAN_TENANT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Preflight (required variables)
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          require() {
            local key="$1"
            local val="$2"
            if [[ -z "${val}" ]]; then
              echo "::error::Missing required GitHub Environment variable: ${key}"
              missing=1
            fi
          }

          require ARM_CLIENT_ID "${ARM_CLIENT_ID:-}"
          require ARM_TENANT_ID "${ARM_TENANT_ID:-}"
          require ARM_SUBSCRIPTION_ID "${ARM_SUBSCRIPTION_ID:-}"
          require TFSTATE_SUBSCRIPTION_ID "${TFSTATE_SUBSCRIPTION_ID:-}"

          if [[ "${missing}" -ne 0 ]]; then
            echo ""
            echo "Set these under: Repo Settings -> Environments -> ${{ matrix.env }} -> Variables"
            exit 1
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: ${{ env.ARM_OIDC_AUDIENCE }}

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config=environments/${{ matrix.env }}/backend.hcl \
            -backend-config="subscription_id=${{ env.TFSTATE_SUBSCRIPTION_ID }}"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -no-color -out=tfplan -var-file=environments/${{ matrix.env }}/terraform.tfvars

      - name: Save plan output
        if: always()
        shell: bash
        run: |
          if [[ -f tfplan ]]; then
            terraform show -no-color tfplan > plan-${{ matrix.env }}.txt
          else
            echo "Plan file not generated (a previous step failed)." > plan-${{ matrix.env }}.txt
          fi

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.env }}
          path: plan-${{ matrix.env }}.txt
          if-no-files-found: error

  apply:
    name: apply (${{ matrix.env }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'

    strategy:
      fail-fast: false
      matrix:
        env: ${{ (github.event.inputs.environment != 'both') && fromJSON(format('["{0}"]', github.event.inputs.environment)) || fromJSON('["dev","prod"]') }}

    environment: ${{ matrix.env }}

    env:
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID }}
      TFSTATE_SUBSCRIPTION_ID: ${{ vars.TFSTATE_SUBSCRIPTION_ID }}

      # Target subscriptions/tenants (provider config). Prefer HUB_* if defined.
      TF_VAR_hub_subscription_id: ${{ vars.HUB_SUBSCRIPTION_ID || vars.ARM_SUBSCRIPTION_ID }}
      TF_VAR_hub_tenant_id: ${{ vars.HUB_TENANT_ID || vars.ARM_TENANT_ID }}
      TF_VAR_virtual_wan_subscription_id: ${{ vars.VIRTUAL_WAN_SUBSCRIPTION_ID }}
      TF_VAR_virtual_wan_tenant_id: ${{ vars.VIRTUAL_WAN_TENANT_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Preflight (required variables)
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          require() {
            local key="$1"
            local val="$2"
            if [[ -z "${val}" ]]; then
              echo "::error::Missing required GitHub Environment variable: ${key}"
              missing=1
            fi
          }

          require ARM_CLIENT_ID "${ARM_CLIENT_ID:-}"
          require ARM_TENANT_ID "${ARM_TENANT_ID:-}"
          require ARM_SUBSCRIPTION_ID "${ARM_SUBSCRIPTION_ID:-}"
          require TFSTATE_SUBSCRIPTION_ID "${TFSTATE_SUBSCRIPTION_ID:-}"

          if [[ "${missing}" -ne 0 ]]; then
            echo ""
            echo "Set these under: Repo Settings -> Environments -> ${{ matrix.env }} -> Variables"
            exit 1
          fi

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}
          audience: ${{ env.ARM_OIDC_AUDIENCE }}

      - name: Terraform init
        run: |
          terraform init -input=false \
            -backend-config=environments/${{ matrix.env }}/backend.hcl \
            -backend-config="subscription_id=${{ env.TFSTATE_SUBSCRIPTION_ID }}"

      - name: Terraform apply
        run: terraform apply -lock-timeout=10m -input=false -auto-approve -var-file=environments/${{ matrix.env }}/terraform.tfvars
