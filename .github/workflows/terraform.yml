  # ------------------------
  # Apply jobs (main only)
  # ------------------------

  apply-dev:
    name: apply (dev) (${{ matrix.stack }})
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - plan-fwpolicy-dev
      - plan-vhub-dev
    if: |
      always() &&
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')) &&
      (needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.dev == 'true') &&
      needs.detect-changes.outputs.apply_dev_stacks_json != '[]'

    strategy:
      fail-fast: false
      matrix:
        stack: ${{ fromJSON(needs.detect-changes.outputs.apply_dev_stacks_json) }}

    concurrency:
      group: tfstate-${{ github.workflow }}-${{ matrix.stack }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
