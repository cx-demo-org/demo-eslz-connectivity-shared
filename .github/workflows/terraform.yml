    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - plan-fwpolicy-prod
    if: |
      always() &&
      (needs.detect-changes.outputs.shared == 'true' ||
       needs.detect-changes.outputs.vhub_prod == 'true')

    concurrency:
      group: tfstate-${{ github.workflow }}-msft-lz-connectivity/msft-vhub-prod
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
