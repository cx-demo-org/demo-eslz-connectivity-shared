name: terraform

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      action:
        description: "What to do"
        type: choice
        required: true
        default: plan
        options:
          - plan
          - apply

permissions:
  contents: read
  id-token: write
  pull-requests: write

# Avoid multiple runs of this workflow stomping on each other.
# (Per-stack concurrency below provides the stronger guarantee.)
concurrency:
  group: tf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID || 'c14be0d1-54b1-4c90-949b-2775aec6307e' }}
  ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID || '9a9712e7-1382-4528-8495-b52ae7688acb' }}
  ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID || '2f69b2b1-5fe0-487d-8c82-52f5edeb454e' }}
  TF_IN_AUTOMATION: true

jobs:
  detect-changes:
    name: detect changed stacks
    runs-on: ubuntu-latest

    outputs:
      # Individual stacks
      vwan_prod: ${{ steps.filter.outputs.vwan_prod }}
      fwpolicy_dev: ${{ steps.filter.outputs.fwpolicy_dev }}
      vhub_dev: ${{ steps.filter.outputs.vhub_dev }}
      fwpolicy_prod: ${{ steps.filter.outputs.fwpolicy_prod }}
      vhub_prod: ${{ steps.filter.outputs.vhub_prod }}

      # Grouping helpers
      shared: ${{ steps.filter.outputs.shared }}
      dev: ${{ steps.filter.outputs.dev }}
      prod: ${{ steps.filter.outputs.prod }}

      # Workflow-only changes should never trigger apply.
      workflow_changed: ${{ steps.filter.outputs.workflow_changed }}
      infra_changed: ${{ steps.infra.outputs.infra_changed }}

      # Apply stack lists (JSON arrays) derived from the above booleans.
      apply_dev_stacks_json: ${{ steps.set-matrix.outputs.apply_dev_stacks_json }}
      apply_prod_stacks_json: ${{ steps.set-matrix.outputs.apply_prod_stacks_json }}

      # Convenience flags for ordered dev apply.
      apply_dev_fwpolicy: ${{ steps.filter.outputs.fwpolicy_dev }}
      apply_dev_vhub: ${{ steps.filter.outputs.vhub_dev }}

    steps:
      - uses: actions/checkout@v4

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            workflow_changed:
              - '.github/workflows/**'

            # Shared root changes that should trigger (almost) everything.
            # Stacks now live at repo root.
            shared:
              - '**'
              - '!.github/**'
              - '!cx-lz-management/**'
              - '!msft-vwan-prod/**'
              - '!msft-fwpolicy-dev/**'
              - '!msft-vhub-dev/**'
              - '!msft-fwpolicy-prod/**'
              - '!msft-vhub-prod/**'
              # NOTE: workflow changes must not trigger infra apply.

            vwan_prod:
              - 'msft-vwan-prod/**'
            fwpolicy_dev:
              - 'msft-fwpolicy-dev/**'
            vhub_dev:
              - 'msft-vhub-dev/**'
            fwpolicy_prod:
              - 'msft-fwpolicy-prod/**'
            vhub_prod:
              - 'msft-vhub-prod/**'

            dev:
              - 'msft-fwpolicy-dev/**'
              - 'msft-vhub-dev/**'
            prod:
              - 'msft-vwan-prod/**'
              - 'msft-fwpolicy-prod/**'
              - 'msft-vhub-prod/**'

      - name: Compute infra_changed
        id: infra
        shell: bash
        run: |
          infra=false
          if [[ "${{ steps.filter.outputs.shared }}" == 'true' || \
                "${{ steps.filter.outputs.vwan_prod }}" == 'true' || \
                "${{ steps.filter.outputs.fwpolicy_dev }}" == 'true' || \
                "${{ steps.filter.outputs.vhub_dev }}" == 'true' || \
                "${{ steps.filter.outputs.fwpolicy_prod }}" == 'true' || \
                "${{ steps.filter.outputs.vhub_prod }}" == 'true' ]]; then
            infra=true
          fi
          echo "infra_changed=${infra}" >> "$GITHUB_OUTPUT"

      - name: Set apply matrices
        id: set-matrix
        shell: bash
        run: |
          # Build minimal apply matrix lists.
          # Rules:
          # - vhub-dev changes => apply fwpolicy-dev and vhub-dev (vhub depends on fwpolicy)
          # - fwpolicy-dev changes => apply fwpolicy-dev and vhub-dev (policy can impact hub routing)
          # - vwan-prod changes => apply vwan-prod and then prod dependents
          # - vhub-prod changes => apply vhub-prod and fwpolicy-prod
          # - fwpolicy-prod changes => apply fwpolicy-prod and vhub-prod
          # - shared changes => apply everything

          apply_dev='[]'
          apply_prod='[]'

          if [[ "${{ steps.filter.outputs.shared }}" == 'true' ]]; then
            apply_dev='["msft-vwan-prod","msft-fwpolicy-dev","msft-vhub-dev"]'
            apply_prod='["msft-fwpolicy-prod","msft-vhub-prod"]'
          else
            # dev
            if [[ "${{ steps.filter.outputs.fwpolicy_dev }}" == 'true' || "${{ steps.filter.outputs.vhub_dev }}" == 'true' ]]; then
              apply_dev='["msft-fwpolicy-dev","msft-vhub-dev"]'
            fi

            # prod
            if [[ "${{ steps.filter.outputs.vwan_prod }}" == 'true' ]]; then
              apply_prod='["msft-vwan-prod","msft-fwpolicy-prod","msft-vhub-prod"]'
            elif [[ "${{ steps.filter.outputs.fwpolicy_prod }}" == 'true' || "${{ steps.filter.outputs.vhub_prod }}" == 'true' ]]; then
              apply_prod='["msft-fwpolicy-prod","msft-vhub-prod"]'
            fi
          fi

          echo "apply_dev_stacks_json=${apply_dev}" >> "$GITHUB_OUTPUT"
          echo "apply_prod_stacks_json=${apply_prod}" >> "$GITHUB_OUTPUT"

  # -----------------
  # Plan jobs (selective)
  # -----------------

  plan-vwan:
    name: plan (msft-vwan-prod)
    runs-on: ubuntu-latest
    needs: detect-changes
    # PRs: plan everything. Push to main: always plan WAN first so downstream stacks
    # can read remote state safely and we maintain a consistent ordering.
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name != 'pull_request' &&
        (needs.detect-changes.outputs.shared == 'true' ||
         needs.detect-changes.outputs.vwan_prod == 'true' ||
         needs.detect-changes.outputs.dev == 'true' ||
         needs.detect-changes.outputs.prod == 'true'))

    concurrency:
      group: tfstate-${{ github.workflow }}-msft-vwan-prod
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: msft-vwan-prod
        run: terraform init -input=false

      - name: Terraform fmt check
        working-directory: msft-vwan-prod
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: msft-vwan-prod
        run: terraform validate

      - name: Terraform plan
        working-directory: msft-vwan-prod
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            terraform plan -lock=false -input=false -no-color -out=tfplan
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            terraform plan -lock=false -input=false -no-color -out=tfplan
          else
            terraform plan -input=false -no-color -out=tfplan
          fi

      - name: Ensure plan output exists
        if: always()
        working-directory: msft-vwan-prod
        shell: bash
        run: |
          if [[ -f plan.txt ]]; then
            exit 0
          fi

          if [[ -f tfplan ]]; then
            terraform show -no-color tfplan > plan.txt
            exit 0
          fi

          echo "Plan output not available (terraform plan did not produce a tfplan file)." > plan.txt

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-msft-vwan-prod
          path: msft-vwan-prod/plan.txt
          if-no-files-found: warn

      - name: Comment plan on PR (summary)
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const stack = 'msft-vwan-prod';
            const path = `${process.env.GITHUB_WORKSPACE}/${stack}/plan.txt`;
            let plan = '';
            try { plan = fs.readFileSync(path, 'utf8'); } catch (e) { plan = `Failed to read plan output: ${e.message}`; }
            const max = 60000;
            if (plan.length > max) plan = plan.slice(0, max) + `\n\n...truncated (${plan.length} chars)`;
            const marker = `<!-- tfplan:${stack} -->`;
            const body = `${marker}\n### Terraform plan: \`${stack}\`\n\n\`\`\`\n${plan}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find(c => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }

