      always() &&
      (needs.detect-changes.outputs.shared == 'true' ||
       needs.detect-changes.outputs.fwpolicy_prod == 'true' ||
       needs.detect-changes.outputs.vhub_prod == 'true') &&
      (needs.detect-changes.outputs.shared == 'true' || needs.plan-vwan.result == 'success')

    concurrency:
      group: tfstate-${{ github.workflow }}-msft-lz-connectivity/msft-fwpolicy-prod
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
