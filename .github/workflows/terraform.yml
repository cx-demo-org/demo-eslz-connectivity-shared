            else await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });

  # ------------------------
  # Apply jobs (main only)
  # ------------------------

  apply-vwan:
    name: apply (msft-vwan-prod)
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - plan-vwan
    if: |
      (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')) &&
      needs.detect-changes.outputs.infra_changed == 'true' &&
      (needs.detect-changes.outputs.shared == 'true' || needs.detect-changes.outputs.vwan_prod == 'true') &&
      needs.plan-vwan.result == 'success'

    concurrency:
      group: tfstate-${{ github.workflow }}-msft-vwan-prod
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: msft-vwan-prod
        run: terraform init -input=false

