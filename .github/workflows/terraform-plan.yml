name: terraform-plan

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  id-token: write
  pull-requests: write

concurrency:
  group: tf-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    name: plan (${{ matrix.stack }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        stack:
          - msft-lz-connectivity/msft-vwan-prod
          - msft-lz-connectivity/msft-fwpolicy-prod
          - msft-lz-connectivity/msft-vhub-prod
          - msft-lz-connectivity/msft-fwpolicy-dev
          - msft-lz-connectivity/msft-vhub-dev

    env:
      ARM_USE_OIDC: true
      ARM_USE_AZUREAD: true
      ARM_CLIENT_ID: ${{ vars.ARM_CLIENT_ID || 'c14be0d1-54b1-4c90-949b-2775aec6307e' }}
      ARM_TENANT_ID: ${{ vars.ARM_TENANT_ID || '9a9712e7-1382-4528-8495-b52ae7688acb' }}
      ARM_SUBSCRIPTION_ID: ${{ vars.ARM_SUBSCRIPTION_ID || '2f69b2b1-5fe0-487d-8c82-52f5edeb454e' }}
      TF_IN_AUTOMATION: true

    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ env.ARM_CLIENT_ID }}
          tenant-id: ${{ env.ARM_TENANT_ID }}
          subscription-id: ${{ env.ARM_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ matrix.stack }}
        run: terraform init -input=false

      - name: Terraform fmt check
        working-directory: ${{ matrix.stack }}
        run: terraform fmt -check -recursive

      - name: Terraform validate
        working-directory: ${{ matrix.stack }}
        run: terraform validate

      - name: Terraform plan
        id: plan
        working-directory: ${{ matrix.stack }}
        run: |
          terraform plan -input=false -no-color -out=tfplan
          terraform show -no-color tfplan > plan.txt

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ replace(matrix.stack, '/', '-') }}
          path: ${{ matrix.stack }}/plan.txt

      - name: Comment plan on PR (summary)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = `${process.env.GITHUB_WORKSPACE}/${{ toJSON(matrix.stack) }}/plan.txt`;
            let plan = '';
            try { plan = fs.readFileSync(path, 'utf8'); } catch (e) { plan = `Failed to read plan output: ${e.message}`; }
            const max = 60000;
            if (plan.length > max) plan = plan.slice(0, max) + `\n\n...truncated (${plan.length} chars)`;
            const marker = `<!-- tfplan:${{ matrix.stack }} -->`;
            const body = `${marker}\n### Terraform plan: \`${{ matrix.stack }}\`\n\n\`\`\`\n${plan}\n\`\`\``;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100
            });

            const existing = comments.find(c => (c.body || '').includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
